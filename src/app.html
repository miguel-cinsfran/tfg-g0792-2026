<!doctype html>
<html lang="es">
	<head>
		<meta charset="utf-8" />
		<!-- Sin zoom de pellizco: escala la pantalla como una foto, sin
		     reflow, y desorienta. Agrandar letras va por el tamaño de
		     fuente del sistema, que el WebView aplica con reflow. -->
		<meta
			name="viewport"
			content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
		/>
		<meta name="theme-color" content="#0f1413" />
		<link rel="manifest" href="%sveltekit.assets%/manifest.json" />
		<link rel="icon" href="%sveltekit.assets%/favicon.png" type="image/png" />
		<link rel="apple-touch-icon" href="%sveltekit.assets%/iconos/icon-192.png" />
		%sveltekit.head%
	</head>
	<!-- preload "tap" (no "hover"): con TalkBack la exploracion por tacto
	     dispara hover sobre cada enlace y el precargado continuo producia
	     trabajo de red/CPU durante el gesto (lag). -->
	<body data-sveltekit-preload-data="tap">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
